<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Savify — Paste a blog, YouTube, or Instagram URL and get an AI-powered structured summary instantly.">
    <title>Savify — AI-Powered Content Summaries</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header__logo">
                <i data-lucide="file-text" class="header__icon"></i>
                <h1 class="header__title">Savify</h1>
            </div>
            <p class="header__subtitle">Paste a blog, YouTube, or Instagram URL. Get a structured AI summary in seconds.
            </p>
            <div class="feature-pills">
                <span class="feature-pill">📝 Blog articles</span>
                <span class="feature-pill">🎬 YouTube videos</span>
                <span class="feature-pill">📸 Instagram Reels</span>
                <span class="feature-pill">🤖 Telegram bot</span>
            </div>
            <a href="/dashboard" class="nav-link">
                <i data-lucide="layout-dashboard"></i>
                View Dashboard
            </a>
        </header>

        <!-- Input Section -->
        <section class="input-section" id="input-section">
            <div class="input-group">
                <input type="url" id="url-input" class="input-field"
                    placeholder="Paste a blog, YouTube, or Instagram URL..." autocomplete="url" autofocus>
                <button id="submit-btn" class="btn btn--primary" onclick="submitUrl()">
                    <i data-lucide="zap" id="btn-icon"></i>
                    <span id="btn-text">Summarize</span>
                    <div id="btn-spinner" class="spinner"></div>
                </button>
            </div>
            <div id="status" class="status"></div>
        </section>

        <!-- Result Section -->
        <section id="result-section" style="display: none;"></section>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
